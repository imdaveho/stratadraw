name: stratadraw
services:
  stratadraw:
    image: localhost/stratadraw:0.3.0
    environment:
      MIX_ENV: dev
      PHX_SERVER: "true"
      PHX_BIND_ALL: "true"
      PORT: "4225"
      PGHOST: stratadraw-db
      PGPORT: "5432"
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: stratadraw_dev
    depends_on:
      stratadraw-db:
        condition: service_healthy
    ports:
      - "4225:4225"
    volumes:
      - .:/app:Z
      - stratadraw_deps:/app/deps
      - stratadraw_build:/app/_build
      - stratadraw_node_modules:/app/assets/node_modules

  stratadraw-db:
    image: docker.io/library/postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: stratadraw_dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d stratadraw_dev"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "5432:5432"
    volumes:
      - stratadraw_postgres:/var/lib/postgresql/data

volumes:
  stratadraw_deps:
  stratadraw_build:
  stratadraw_node_modules:
  stratadraw_postgres:
