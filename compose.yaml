name: stratadraw
services:
  stratadraw:
    build:
      context: .
      dockerfile: Containerfile.dev
    environment:
      MIX_ENV: dev
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
      ELIXIR_ERL_OPTIONS: "+fnu"
      PHX_BIND_ALL: "true"
      PHX_HOST: localhost
      PORT: "4225"
      PGHOST: db
      PGPORT: "5432"
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: stratadraw_dev
    ports:
      - "4225:4225"
    volumes:
      - .:/app:Z
      - stratadraw_build:/app/_build:Z
      - stratadraw_deps:/app/deps:Z
      - stratadraw_node_modules:/app/assets/node_modules:Z
    depends_on:
      - db
    command: >
      sh -lc 'until pg_isready -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" -d "$PGDATABASE"; do sleep 1; done &&
      mix deps.get &&
      mix assets.setup &&
      (mix ecto.create || true) &&
      mix ecto.migrate &&
      mix phx.server'

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: stratadraw_dev
    ports:
      - "5432:5432"
    volumes:
      - stratadraw_postgres:/var/lib/postgresql/data

volumes:
  stratadraw_build:
  stratadraw_deps:
  stratadraw_node_modules:
  stratadraw_postgres:
